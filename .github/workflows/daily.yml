name: NodeSeek 自动签到评论加鸡腿

on:
  push:
    branches:
      - main
  schedule:
    - cron: '10 3 * * *'  # UTC 03:10, which is Beijing Time 11:10
  workflow_dispatch:

jobs:
  run-nodeseek-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.11.8'

      - name: Install Chrome and Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver xvfb
          echo "Chrome version:"
          chromium-browser --version
          echo "ChromeDriver version:"
          chromedriver --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Random delay (0-40 minutes)
        if: github.event_name == 'schedule'
        run: |
          delay=$((RANDOM % 2400))
          echo "Delaying execution by $delay seconds (around $((delay / 60)) minutes)..."
          sleep $delay

      - name: Run NodeSeek script
        env:
          NS_COOKIE: ${{ secrets.NS_COOKIE }}
          NS_RANDOM: ${{ secrets.NS_RANDOM }}
          HEADLESS: "true"
        run: |
          python nodeseek_daily.py